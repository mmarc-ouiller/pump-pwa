<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#ffffff" />
  <title>Pump</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./src/design/base.css" />
  <link rel="stylesheet" href="./src/design/components.css" />
  <link rel="stylesheet" href="./src/features/home/home.css" />
  <link rel="stylesheet" href="./src/features/active-workout/active-workout.css" />
  <link rel="stylesheet" href="./src/features/history/history.css" />
  <link rel="stylesheet" href="./src/features/exercise-picker/exercise-picker.css" />
  <link rel="stylesheet" href="./src/features/stats/stats.css" />
  <link rel="stylesheet" href="./src/features/exercises/exercises.css" />
  <link rel="stylesheet" href="./src/features/template-editor/template-editor.css" />
  <style>
    #tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      background: var(--color-bg);
      border-top: var(--border-width) solid var(--color-border);
      height: calc(56px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    #tabbar .tab {
      height: 56px;
      font-family: var(--font-base);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: transparent;
      border: none;
      border-right: var(--border-width) solid var(--color-border);
      cursor: pointer;
      color: var(--color-text-muted);
      -webkit-tap-highlight-color: transparent;
      padding: 0 2px;
    }

    #tabbar .tab:last-child {
      border-right: none;
    }

    #tabbar .tab[aria-current="page"],
    #tabbar .tab.tab--active {
      background: var(--color-text);
      color: var(--color-surface);
    }

    #app {
      padding-bottom: calc(56px + env(safe-area-inset-bottom));
    }

    #modal {
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius);
    }

    #modal::backdrop {
      background: rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <nav id="tabbar" role="navigation" aria-label="Main navigation">
    <button class="tab" data-route="/" aria-current="page">HOME</button>
    <button class="tab" data-route="/history">HISTORY</button>
    <button class="tab" data-route="/stats">STATS</button>
    <button class="tab" data-route="/exercises">EXERCISES</button>
  </nav>
  <dialog id="modal" aria-modal="true" aria-label="Exercise Picker"></dialog>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
