<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Pump</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./src/design/base.css" />
  <link rel="stylesheet" href="./src/design/components.css" />
  <link rel="stylesheet" href="./src/features/home/home.css" />
  <link rel="stylesheet" href="./src/features/active-workout/active-workout.css" />
  <link rel="stylesheet" href="./src/features/history/history.css" />
  <link rel="stylesheet" href="./src/features/exercise-picker/exercise-picker.css" />
  <style>
    #tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      width: 100%;
      height: var(--touch-target);
      background: var(--color-bg);
      border-top: var(--border-width) solid var(--color-border);
      font-family: var(--font-mono);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #tabbar .tab {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--color-fg);
      font-size: var(--font-caption);
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      border-right: var(--border-width) solid var(--color-border);
      font-family: var(--font-mono);
    }

    #tabbar .tab:last-child {
      border-right: none;
    }

    #tabbar .tab[aria-current="page"] {
      background: var(--color-fg);
      color: var(--color-bg);
    }

    body {
      padding-bottom: calc(var(--touch-target) + env(safe-area-inset-bottom));
    }

    #modal {
      border: var(--border-width) solid var(--color-border);
      border-radius: var(--radius);
    }

    #modal::backdrop {
      background: rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <nav id="tabbar">
    <button class="tab" data-route="/" aria-current="page">HOME</button>
    <button class="tab" data-route="/history">HISTORY</button>
  </nav>
  <dialog id="modal" aria-modal="true" aria-label="Exercise Picker"></dialog>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
